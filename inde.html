<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Shape Animation | Particles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            display: block;
            cursor: pointer;
        }
        .info {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
        }
        .info span {
            color: #ff3366;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">❤️ <span>I LOVE YOU</span> ❤️</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let heartPoints = [];
        let pulseTime = 0;
        
        // Настройки
        const settings = {
            numParticles: 200,      // количество частиц
            particleSize: 2.5,
            glowIntensity: 0.8
        };
        
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            generateHeartShape();
        }
        
        // Твоя функция generateHeartShape (полностью как на скрине, но дополнена)
        function generateHeartShape() {
            heartPoints = [];
            const centerX = width / 2;
            const centerY = height / 2;
            
            const pulse = 1 + Math.sin(pulseTime) * 0.08;
            const scale = 14 * pulse;
            
            const steps = Math.max(40, settings.numParticles);
            
            for (let i = 0; i < steps; i++) {
                const t = (i / steps) * Math.PI * 2;
                
                // Математическая формула сердца
                const x = centerX + scale * 16 * Math.pow(Math.sin(t), 3);
                const y = centerY - scale * (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                
                heartPoints.push({x, y});
            }
        }
        
        // Добавляем случайное смещение для более живой анимации
        let particles = [];
        
        function initParticles() {
            particles = [];
            for (let i = 0; i < settings.numParticles; i++) {
                // Каждая частица следует за своей позицией на сердце + плавает
                particles.push({
                    targetIndex: i,
                    x: 0, y: 0,
                    offsetX: (Math.random() - 0.5) * 8,
                    offsetY: (Math.random() - 0.5) * 8,
                    size: settings.particleSize + Math.random() * 2,
                    alpha: 0.6 + Math.random() * 0.4,
                    speed: 0.02 + Math.random() * 0.03
                });
            }
        }
        
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.02;
            pulseTime += 0.03;
            
            // Обновляем форму сердца (пульсация)
            generateHeartShape();
            
            // Очистка с эффектом послесвечения
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            // Обновляем и рисуем частицы
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                const target = heartPoints[p.targetIndex] || heartPoints[0];
                
                if (!target) continue;
                
                // Движение к целевой точке с плавностью и "хвостами"
                const floatX = Math.sin(time * p.speed + i) * 3;
                const floatY = Math.cos(time * p.speed * 0.7 + i) * 3;
                
                const targetX = target.x + p.offsetX + floatX;
                const targetY = target.y + p.offsetY + floatY;
                
                // Плавное следование
                p.x = p.x || targetX;
                p.y = p.y || targetY;
                p.x = p.x * 0.92 + targetX * 0.08;
                p.y = p.y * 0.92 + targetY * 0.08;
                
                // Цвет частицы (градиент от красного к розовому)
                const gradient = ctx.createLinearGradient(p.x - 5, p.y - 5, p.x + 5, p.y + 5);
                const hue = 340 + Math.sin(time + i) * 10;
                gradient.addColorStop(0, `hsla(${hue}, 100%, 65%, ${p.alpha})`);
                gradient.addColorStop(1, `hsla(${hue + 20}, 100%, 55%, ${p.alpha * 0.8})`);
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * (0.8 + Math.sin(time * 5 + i) * 0.2), 0, Math.PI * 2);
                
                // Свечение
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#ff3366';
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // Маленькое яркое ядро
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${0.5 + Math.sin(time * 10) * 0.3})`;
                ctx.fill();
            }
            
            // Сброс тени для следующих кадров
            ctx.shadowBlur = 0;
            
            // Дополнительно: рисуем мерцающий текст в центре
            ctx.font = `bold ${Math.sin(time * 3) * 5 + 28}px "Segoe UI", "Arial"`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ff3366';
            ctx.fillStyle = `rgba(255, 255, 255, ${0.7 + Math.sin(time * 4) * 0.3})`;
            ctx.fillText('❤️ I love you ❤️', width / 2, height / 2 + 100);
            ctx.shadowBlur = 0;
        }
        
        // При изменении размера окна пересчитываем
        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });
        
        // Запуск
        resizeCanvas();
        initParticles();
        animate();
    </script>
</body>
</html>
