<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Particles Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        let targetPoints = []; // точки формы сердца (куда лететь)
        let animationProgress = 0; // 0 = рандом, 1 = полное сердце
        let animationStarted = false;
        
        const PARTICLE_COUNT = 300;
        
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            generateHeartTargets();
            initParticles();
        }
        
        // Генерация точек в форме сердца (та же формула что и на скрине)
        function generateHeartTargets() {
            targetPoints = [];
            const centerX = width / 2;
            const centerY = height / 2;
            const scale = Math.min(width, height) / 28;
            
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const t = (i / PARTICLE_COUNT) * Math.PI * 2;
                
                // Формула сердца
                const x = centerX + scale * 16 * Math.pow(Math.sin(t), 3);
                const y = centerY - scale * (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                
                targetPoints.push({ x, y });
            }
        }
        
        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push({
                    // Стартовая позиция - случайно по всему экрану
                    x: Math.random() * width,
                    y: Math.random() * height,
                    targetX: targetPoints[i].x,
                    targetY: targetPoints[i].y,
                    size: 2 + Math.random() * 2,
                    speed: 0.01 + Math.random() * 0.02,
                    progress: Math.random() // каждый начинает с разной фазы
                });
            }
        }
        
        let time = 0;
        let buildComplete = false;
        
        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.008;
            
            // Постепенно увеличиваем прогресс анимации (циклично или один раз)
            if (!buildComplete) {
                animationProgress += 0.003;
                if (animationProgress >= 1) {
                    animationProgress = 1;
                    buildComplete = true;
                }
            }
            
            // Полупрозрачный хвост (эффект следа)
            ctx.fillStyle = 'rgba(10, 10, 10, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                
                // Индивидуальный прогресс частицы с небольшим случайным сдвигом
                let individualProgress = Math.min(1, Math.max(0, (animationProgress - p.progress * 0.3) / 0.7));
                if (!buildComplete) {
                    individualProgress = Math.min(1, individualProgress);
                } else {
                    // Готово - частицы слегка пульсируют
                    const pulse = 1 + Math.sin(time * 5 + i) * 0.05;
                    const targetX = p.targetX + (Math.sin(time + i) * 1.5);
                    const targetY = p.targetY + (Math.cos(time * 1.3 + i) * 1.5);
                    
                    p.x = p.x * 0.95 + targetX * 0.05;
                    p.y = p.y * 0.95 + targetY * 0.05;
                    
                    drawParticle(p.x, p.y, p.size, individualProgress);
                    continue;
                }
                
                // Легкая кривая Безье для плавности (ease out)
                const easeProgress = 1 - Math.pow(1 - individualProgress, 1.5);
                
                // Интерполяция между стартом и целью
                const startX = p.x;
                const startY = p.y;
                const targetX = p.targetX;
                const targetY = p.targetY;
                
                // Случайное блуждание во время полета
                const wanderX = Math.sin(time * 3 + i) * 15 * (1 - easeProgress);
                const wanderY = Math.cos(time * 2.5 + i * 1.3) * 15 * (1 - easeProgress);
                
                let newX = startX * (1 - easeProgress) + targetX * easeProgress + wanderX;
                let newY = startY * (1 - easeProgress) + targetY * easeProgress + wanderY;
                
                // Если прогресс маленький - хаотичнее
                if (easeProgress < 0.3) {
                    newX += (Math.random() - 0.5) * 8;
                    newY += (Math.random() - 0.5) * 8;
                }
                
                p.x = newX;
                p.y = newY;
                
                drawParticle(p.x, p.y, p.size, individualProgress);
            }
            
            // Рисуем текст когда сердце почти собрано
            if (animationProgress > 0.7) {
                ctx.font = `bold ${30 + Math.sin(time * 8) * 3}px "Segoe UI"`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#ff3366";
                ctx.fillStyle = `rgba(255, 100, 150, ${(animationProgress - 0.7) / 0.3 * 0.9})`;
                ctx.fillText("❤️ I LOVE YOU ❤️", width / 2, height / 2 + 90);
                ctx.shadowBlur = 0;
            }
        }
        
        function drawParticle(x, y, size, progress) {
            // Цвет от белого к красному по мере приближения
            const intensity = Math.min(1, progress * 1.5);
            const r = 200 + Math.floor(55 * intensity);
            const g = 70 + Math.floor(60 * (1 - intensity));
            const b = 100 + Math.floor(50 * (1 - intensity));
            
            ctx.beginPath();
            ctx.arc(x, y, size * (0.7 + intensity * 0.5), 0, Math.PI * 2);
            
            // Свечение
            ctx.shadowBlur = 8;
            ctx.shadowColor = `rgba(255, 70, 120, ${0.3 + intensity * 0.7})`;
            ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
            ctx.fill();
            
            // Яркая точка по центру
            ctx.beginPath();
            ctx.arc(x, y, size * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 200, 220, ${0.8})`;
            ctx.fill();
        }
        
        // Рестарт анимации по клику
        canvas.addEventListener('click', () => {
            animationProgress = 0;
            buildComplete = false;
            initParticles();
        });
        
        window.addEventListener('resize', () => {
            resizeCanvas();
            animationProgress = 0;
            buildComplete = false;
        });
        
        resizeCanvas();
        animate();
    </script>
</body>
</html>
